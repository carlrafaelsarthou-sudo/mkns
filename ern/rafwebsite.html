	<script>
	   function playpause()
	   {
	       var p = document.getElementById("video1"); 
		   if(p.paused)
		   {
		      p.play();
		   }
		   else
		   {
		     p.pause();
		   }
	   }
	   const video = document.getElementById("video1");

		function skip(seconds)
	  {
    video.currentTime += seconds;
	  }
	</script>
